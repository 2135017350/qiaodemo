spring.datasource.url=jdbc:mysql://localhost:3306/bridge_rhyme?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Serve static content from the 'public' directory in the project root
spring.web.resources.static-locations=file:./public/

# Kimi API Configuration (可选，不配置则使用本地对话)
kimi.api.key=
